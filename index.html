<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soldier Assault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .shop-tab-active {
            background: #06b6d4;
            color: #0f172a;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
            border: 2px solid #0f172a;
        }
        .item-card {
            transition: all 0.2s ease;
        }
        .item-card:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.8);
        }
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
        #minimap {
            width: 120px;
            height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .map-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #bossWarning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            text-align: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #bossWarning.active { opacity: 1; }
        
        .mute-btn {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .mute-btn:hover { background: rgba(30, 41, 59, 1); transform: scale(1.1); }
        .mute-btn.muted { border-color: #f43f5e; color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
    </style>
</head>
<body class="antialiased">

    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <!-- Boss Warning -->
    <div id="bossWarning">
        <h2 class="text-rose-500 text-6xl font-black italic tracking-tighter animate-pulse">BOSS INCOMING</h2>
        <p class="text-white font-bold tracking-[0.5em] uppercase">Prepare for Titan Battle</p>
    </div>

    <!-- HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none hidden z-10">
        <div class="flex flex-col gap-0.5">
            <!-- Score Area -->
            <div class="text-xl md:text-3xl font-black text-cyan-400 italic leading-none">SCORE: <span id="scoreDisplay">0</span></div>
            
            <!-- Coin Area (Moved even higher) -->
            <div class="flex items-center gap-2 text-amber-400 font-black text-xs md:text-base mt-0.5">
                <div class="w-2 h-2 bg-amber-400 rounded-full shadow-[0_0_8px_#fbbf24]"></div>
                <span class="tracking-wider">COINS: <span id="coinHUD">0</span></span>
            </div>

            <!-- Wave Display -->
            <div id="waveLabel" class="text-slate-400 font-black uppercase tracking-widest text-[9px] mt-1.5">WAVE: <span id="waveDisplay" class="text-white">1</span></div>
            
            <!-- Health Area -->
            <div class="mt-1.5 w-44 md:w-64">
                <div class="flex justify-between text-[10px] font-black mb-1 text-slate-500 tracking-widest uppercase">
                    <span>VITALS</span>
                    <span id="healthText">100%</span>
                </div>
                <div class="h-1.5 w-full bg-slate-950 rounded-full overflow-hidden border border-slate-800">
                    <div id="healthBar" class="h-full bg-cyan-500 transition-all duration-300 w-full shadow-[0_0_15px_rgba(6,182,212,0.6)]"></div>
                </div>
                <div id="armorNameDisplay" class="text-[7px] text-slate-600 font-black mt-1 tracking-[0.2em] uppercase">RECRUIT MESH</div>
            </div>

            <!-- Boss Health -->
            <div id="bossBarContainer" class="hidden mt-4">
                <div class="flex justify-between text-[8px] font-black mb-1 text-rose-500 tracking-[0.3em] uppercase">
                    <span id="bossNameLabel">TITAN BOSS</span>
                    <span id="bossHealthText">1000/1000</span>
                </div>
                <div class="h-2.5 w-44 md:w-64 bg-slate-900 rounded-full overflow-hidden border border-rose-900/50">
                    <div id="bossHealthBar" class="h-full bg-rose-600 w-full shadow-[0_0_15px_rgba(225,29,72,0.6)]"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2 pr-12">
            <div id="minimapContainer" class="p-1 bg-slate-900/40 rounded-xl border border-slate-800 backdrop-blur-sm">
                <div id="minimap">
                    <div id="minimapContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="absolute inset-0 flex flex-col items-center justify-center z-20 glass-panel p-4 text-center">
        <!-- Top Left: Shop -->
        <div class="absolute top-4 left-4 md:top-8 md:left-8">
            <button id="openShopBtn" class="flex items-center gap-2 md:gap-4 px-4 py-2 md:px-8 md:py-4 bg-slate-800 hover:bg-cyan-600 border border-slate-700 rounded-xl md:rounded-2xl transition-all group">
                <span class="text-xl md:text-2xl">🛒</span>
                <div class="text-left hidden md:block">
                    <div class="text-[10px] font-black uppercase text-slate-500 group-hover:text-cyan-100">Marketplace</div>
                    <div class="font-black uppercase tracking-widest text-white">SHOP</div>
                </div>
            </button>
        </div>

        <!-- Top Right: Vault -->
        <div class="absolute top-4 right-4 md:top-8 md:right-8 text-right">
            <div class="text-slate-500 text-[8px] md:text-[10px] font-black uppercase tracking-[0.2em] mb-1">Vault</div>
            <div class="flex items-center gap-2 justify-end">
                <div class="w-4 h-4 bg-amber-500 rounded-full"></div>
                <div class="text-xl md:text-4xl font-black text-amber-400" id="menuCoinDisplay">0</div>
            </div>
        </div>

        <!-- Center: Branding -->
        <h1 class="text-5xl md:text-9xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-cyan-400 to-blue-700 italic tracking-tighter">SOLDIER ASSAULT</h1>
        <p class="text-slate-400 text-xs md:text-xl tracking-[0.3em] md:tracking-[0.5em] uppercase mb-8 md:mb-12">Tiered Augmentation Combat</p>
        
        <button id="startBtn" class="px-10 py-4 md:px-20 md:py-6 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black text-xl md:text-3xl rounded-full transition-all hover:scale-105 active:scale-95 shadow-[0_0_40px_rgba(6,182,212,0.4)] uppercase italic tracking-widest">
            Enter the Grid
        </button>

        <!-- Bottom Right: Sound Control -->
        <div class="absolute bottom-4 right-4 md:bottom-8 md:right-8 flex flex-col items-center gap-2">
            <div class="text-[8px] font-black text-slate-500 uppercase tracking-widest">System Audio</div>
            <button id="muteBtn" class="mute-btn" title="Toggle Sound">
                <svg id="soundOnIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                <svg id="soundOffIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zM17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"></path></svg>
            </button>
        </div>
    </div>

    <!-- Expanded Shop -->
    <div id="shopScreen" class="absolute inset-0 flex items-center justify-center z-30 glass-panel hidden p-2 md:p-4">
        <div class="w-full max-w-6xl h-full md:h-[90vh] bg-slate-950 rounded-xl md:rounded-3xl border border-slate-800 flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 md:p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div>
                    <h2 class="text-2xl md:text-5xl font-black text-white italic tracking-tighter">SHOP</h2>
                    <p class="text-cyan-500 font-bold uppercase text-[10px] tracking-widest">Weaponry • Armor • Mobility</p>
                </div>
                <div class="flex items-center gap-4 md:gap-6">
                    <div class="text-right">
                        <div class="text-[8px] font-black text-slate-500 uppercase">Balance</div>
                        <div class="text-xl md:text-3xl font-black text-amber-400" id="shopCoinDisplay">0</div>
                    </div>
                    <button id="closeShopBtn" class="bg-slate-800 hover:bg-rose-600 p-2 md:p-4 rounded-lg md:rounded-xl transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex border-b border-slate-800">
                <button id="weaponsTab" class="flex-1 py-4 md:py-6 text-xs md:text-lg font-black uppercase tracking-widest shop-tab-active transition-all">Weapons</button>
                <button id="armorsTab" class="flex-1 py-4 md:py-6 text-xs md:text-lg font-black uppercase tracking-widest bg-slate-900 text-slate-500 hover:text-white transition-all">Armor</button>
                <button id="bootsTab" class="flex-1 py-4 md:py-6 text-xs md:text-lg font-black uppercase tracking-widest bg-slate-900 text-slate-500 hover:text-white transition-all">Boots</button>
            </div>

            <div id="shopContent" class="flex-1 overflow-y-auto p-4 md:p-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4 custom-scrollbar bg-slate-950"></div>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center z-20 glass-panel hidden text-center p-4">
        <h2 class="text-6xl md:text-9xl font-black mb-4 text-rose-500 italic tracking-tighter">GAME OVER</h2>
        <div class="bg-slate-900/80 p-6 md:p-10 rounded-2xl md:rounded-3xl border border-slate-800 w-full max-w-lg mb-8 md:mb-10">
            <div class="text-6xl font-black text-amber-400 mb-6" id="earnedCoins">+0</div>
            <div class="flex justify-between text-slate-400 font-bold border-t border-slate-800 pt-6 text-sm">
                <span>Score: <span id="finalScore" class="text-white">0</span></span>
                <span>Wave: <span id="finalWave" class="text-white">1</span></span>
            </div>
        </div>
        <div class="flex flex-col md:flex-row gap-4 w-full max-w-xs md:max-w-none justify-center">
            <button id="restartBtn" class="px-12 py-5 bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black text-xl rounded-full transition-all uppercase tracking-widest italic">Retry</button>
            <button id="homeBtn" class="px-12 py-5 bg-slate-800 hover:bg-slate-700 text-white font-black text-xl rounded-full transition-all uppercase tracking-widest border border-slate-700">Menu</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const minimapContent = document.getElementById('minimapContent');
        const muteBtn = document.getElementById('muteBtn');
        const WORLD_SIZE = 3000;

        // --- SOUND EFFECTS SYNTHESIZER ---
        class SoundFX {
            constructor() {
                this.ctx = null;
                this.whiteNoiseBuffer = null;
                this.isMuted = false;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.createNoiseBuffer();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }
            toggleMute() {
                this.isMuted = !this.isMuted;
                document.getElementById('soundOnIcon').classList.toggle('hidden', this.isMuted);
                document.getElementById('soundOffIcon').classList.toggle('hidden', !this.isMuted);
                document.getElementById('muteBtn').classList.toggle('muted', this.isMuted);
                if (this.isMuted && 'speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }
                return this.isMuted;
            }
            createNoiseBuffer() {
                const bufferSize = this.ctx.sampleRate * 2;
                this.whiteNoiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = this.whiteNoiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
            }
            playTone(freq, type, duration, vol = 0.1, slideFreq = null) {
                if (!this.ctx || this.isMuted) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) {
                    osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                }
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }

            swing() {
                if (!this.ctx || this.isMuted) return;
                const duration = 0.2;
                const noise = this.ctx.createBufferSource();
                noise.buffer = this.whiteNoiseBuffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.setValueAtTime(4000, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + duration);
                filter.Q.setValueAtTime(5, this.ctx.currentTime);

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start();
                noise.stop(this.ctx.currentTime + duration);
                
                this.playTone(150, 'sine', duration, 0.05, 80);
            }
            
            oof() {
                if (this.isMuted) return;
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance("oof");
                    utterance.pitch = 1.8;
                    utterance.rate = 3.0; 
                    utterance.volume = 0.8;
                    window.speechSynthesis.speak(utterance);
                }
                this.playTone(350, 'sine', 0.1, 0.1, 200);
            }

            hit() { this.oof(); } 
            playerHit() { this.oof(); } 
            enemyDie() { this.playTone(200, 'sawtooth', 0.15, 0.05, 50); }
            heal() { 
                this.playTone(400, 'sine', 0.1, 0.05);
                setTimeout(() => this.playTone(600, 'sine', 0.2, 0.05), 100);
            }
            bossSpawn() { this.playTone(150, 'sawtooth', 1.0, 0.1, 30); }
            bossDie() { this.playTone(150, 'square', 0.5, 0.1, 40); }
            click() { this.playTone(600, 'sine', 0.05, 0.05); }
        }
        
        const sfx = new SoundFX();
        muteBtn.onclick = () => {
            sfx.init();
            sfx.toggleMute();
        };
        
        function fillRoundedRect(c, x, y, width, height, radius) {
            c.beginPath();
            c.moveTo(x + radius, y);
            c.lineTo(x + width - radius, y);
            c.quadraticCurveTo(x + width, y, x + width, y + radius);
            c.lineTo(x + width, y + height - radius);
            c.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            c.lineTo(x + radius, y + height);
            c.quadraticCurveTo(x, y + height, x, y + height - radius);
            c.lineTo(x, y + radius);
            c.quadraticCurveTo(x, y, x + radius, y);
            c.closePath();
            c.fill();
        }

        const SHOP_ITEMS = { weapons: [], armors: [], boots: [] };
        
        const WEAPON_PREFIXES = ["Rust", "Iron", "Neon", "Pulse", "Sonic", "Thermal", "Plasma", "Void", "Quantum", "Omega"];
        const WEAPON_NAMES = ["Blade", "Saber", "Edge", "Cutter", "Reaver", "Slasher", "Cleaver", "Katana", "Glaive", "Eviscerator"];
        const ARMOR_NAMES = ["Mesh", "Suit", "Plate", "Shell", "Frame", "Guard", "Skin", "Chassis", "Core", "Bastion"];
        const ARMOR_COLORS = ['#06b6d4', '#0891b2', '#0e7490', '#10b981', '#059669', '#8b5cf6', '#7c3aed', '#d946ef', '#f59e0b', '#ef4444'];
        const BOOT_NAMES = ["Stride", "Step", "Rush", "Dash", "Glide", "Bolt", "Warp", "Sprint", "Phase", "Aero"];

        for(let i=0; i<50; i++) {
            const level = i + 1;
            SHOP_ITEMS.weapons.push({
                id: `w_${i}`,
                name: i === 0 ? "Starter Blade" : `${WEAPON_PREFIXES[Math.floor(i/5)]} ${WEAPON_NAMES[i % 10]} v.${level}`,
                desc: `Tier ${level} damage augment.`,
                price: i === 0 ? 0 : Math.floor(Math.pow(level, 2.2) * 80 + 200),
                damage: 40 + (i * 15),
                reach: 90 + (i * 2),
                rate: Math.max(150, 400 - (i * 5))
            });
            SHOP_ITEMS.armors.push({
                id: `a_${i}`,
                name: i === 0 ? "Recruit Mesh" : `${WEAPON_PREFIXES[Math.floor(i/5)]} ${ARMOR_NAMES[i % 10]} Mk.${level}`,
                desc: `Tier ${level} survival plating.`,
                price: i === 0 ? 0 : Math.floor(Math.pow(level, 2.1) * 70 + 150),
                health: 100 + (i * 50),
                color: ARMOR_COLORS[Math.floor(i/5)] || '#ffffff'
            });
        }
        for(let i=0; i<20; i++) {
            const level = i + 1;
            SHOP_ITEMS.boots.push({
                id: `b_${i}`,
                name: i === 0 ? "Basic Boots" : `${WEAPON_PREFIXES[Math.floor(i/2)]} ${BOOT_NAMES[i % 10]} X${level}`,
                desc: `Tier ${level} speed servos.`,
                price: i === 0 ? 0 : Math.floor(Math.pow(level, 2.3) * 100 + 300),
                speed: 3 + (i * 0.4)
            });
        }

        let state = {
            isRunning: false,
            score: 0,
            totalCoins: 0,
            sessionCoins: 0,
            wave: 1,
            isBossPhase: false,
            camera: { x: 0, y: 0 },
            shake: 0,
            lastTime: 0,
            enemySpawnTimer: 0,
            currentWeapon: 'w_0',
            currentArmor: 'a_0',
            currentBoots: 'b_0',
            ownedItems: ['w_0', 'a_0', 'b_0'],
            scoreThreshold: 3000
        };

        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { x: 0, y: 0, worldX: 0, worldY: 0, isDown: false };
        let player, enemies = [], particles = [], floatingTexts = [], medics = [], bosses = [];

        function loadData() {
            const saved = localStorage.getItem('cyber_soldier_storage');
            if (saved) {
                const d = JSON.parse(saved);
                state.totalCoins = d.totalCoins || 0;
                state.currentWeapon = d.currentWeapon || 'w_0';
                state.currentArmor = d.currentArmor || 'a_0';
                state.currentBoots = d.currentBoots || 'b_0';
                state.ownedItems = d.ownedItems || ['w_0', 'a_0', 'b_0'];
            }
            updateCoinUI();
        }

        function saveData() {
            localStorage.setItem('cyber_soldier_storage', JSON.stringify({
                totalCoins: state.totalCoins,
                currentWeapon: state.currentWeapon,
                currentArmor: state.currentArmor,
                currentBoots: state.currentBoots,
                ownedItems: state.ownedItems
            }));
        }

        function updateCoinUI() {
            const currentTotal = state.isRunning ? (state.totalCoins + state.sessionCoins) : state.totalCoins;
            const coinHUD = document.getElementById('coinHUD');
            if (coinHUD) coinHUD.innerText = Math.floor(currentTotal);
            const mcd = document.getElementById('menuCoinDisplay');
            if (mcd) mcd.innerText = Math.floor(state.totalCoins);
            const scd = document.getElementById('shopCoinDisplay');
            if (scd) scd.innerText = Math.floor(state.totalCoins);
            const sd = document.getElementById('scoreDisplay');
            if (sd) sd.innerText = Math.floor(state.score);
        }

        function updateHealthUI() {
            if (!player) return;
            const p = Math.max(0, (player.health/player.maxHealth)*100);
            const hb = document.getElementById('healthBar');
            if (hb) hb.style.width = p+'%';
            const ht = document.getElementById('healthText');
            if (ht) ht.innerText = Math.ceil(p)+'%';
        }

        class Player {
            constructor(x, y) {
                const arm = SHOP_ITEMS.armors.find(a => a.id === state.currentArmor) || SHOP_ITEMS.armors[0];
                const wpn = SHOP_ITEMS.weapons.find(w => w.id === state.currentWeapon) || SHOP_ITEMS.weapons[0];
                const bts = SHOP_ITEMS.boots.find(b => b.id === state.currentBoots) || SHOP_ITEMS.boots[0];
                
                this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.radius = 22; this.angle = 0;
                this.maxHealth = arm.health; 
                this.health = this.maxHealth;
                this.color = arm.color;
                this.damage = wpn.damage; 
                this.reach = wpn.reach; 
                this.rate = wpn.rate;
                this.moveSpeed = bts.speed;
                this.lastSwing = 0; 
                this.swinging = false; 
                this.swingTimer = 0;
                this.swingDuration = 200; 
                this.hitList = new Set();
                
                const and = document.getElementById('armorNameDisplay');
                if (and) and.innerText = arm.name;
                updateHealthUI();
            }
            update(dt) {
                const moveDt = dt / 16;
                if (keys.w) this.vy -= this.moveSpeed * 0.15; if (keys.s) this.vy += this.moveSpeed * 0.15;
                if (keys.a) this.vx -= this.moveSpeed * 0.15; if (keys.d) this.vx += this.moveSpeed * 0.15;
                this.vx *= 0.88; this.vy *= 0.88;
                this.x += this.vx * moveDt; this.y += this.vy * moveDt;
                this.x = Math.max(this.radius, Math.min(WORLD_SIZE-this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(WORLD_SIZE-this.radius, this.y));

                this.angle = Math.atan2(mouse.worldY - this.y, mouse.worldX - this.x);

                if (this.swinging) {
                    this.swingTimer += dt;
                    const prog = Math.min(1, this.swingTimer / this.swingDuration);
                    const swordAngle = this.attackStartAngle + (-Math.PI/2 + prog * Math.PI);
                    const check = (t) => {
                        if (this.hitList.has(t)) return;
                        const d = Math.hypot(t.x-this.x, t.y-this.y);
                        if (d < this.reach + t.radius) {
                            let tA = Math.atan2(t.y-this.y, t.x-this.x);
                            let diff = Math.atan2(Math.sin(tA-swordAngle), Math.cos(tA-swordAngle));
                            if (Math.abs(diff) < 0.6) {
                                if (t instanceof Medic) t.hit(); else t.hit(this.damage);
                                this.hitList.add(t); state.shake = 5;
                            }
                        }
                    };
                    enemies.forEach(check); bosses.forEach(check); medics.forEach(check);
                    if (this.swingTimer > this.swingDuration) this.swinging = false;
                } else if (mouse.isDown && performance.now() - this.lastSwing > this.rate) {
                    this.swinging = true; this.swingTimer = 0; this.attackStartAngle = this.angle;
                    this.lastSwing = performance.now(); this.hitList.clear(); sfx.swing();
                }
            }
            takeDamage(a) { 
                this.health -= a; updateHealthUI(); state.shake = 15; sfx.playerHit(); 
                if(this.health <= 0) die(); 
            }
            healFull() {
                this.health = this.maxHealth; updateHealthUI(); sfx.heal();
                floatingTexts.push(new FloatingText(this.x, this.y-40, "REPAIRED", "#10b981"));
            }
            draw(c) {
                c.save(); c.translate(this.x, this.y); c.rotate(this.angle);
                c.shadowBlur = 15; c.shadowColor = this.color; c.fillStyle = this.color;
                fillRoundedRect(c, -15, -18, 30, 36, 12);
                c.beginPath(); c.arc(0,0,10,0,7); c.fillStyle="#fff"; c.fill();
                c.fillStyle="#000"; c.fillRect(0,-2,10,4);
                c.save();
                if (this.swinging) {
                    const p = Math.min(1, this.swingTimer/this.swingDuration);
                    c.rotate(-Math.PI/2 + p * Math.PI);
                } else {
                    c.rotate(-Math.PI/2); c.translate(8, 0);
                }
                c.translate(15, 0); c.fillStyle='#475569'; c.fillRect(0,-10,6,20);
                c.shadowBlur=10; c.shadowColor='white'; c.fillStyle='white';
                c.beginPath(); c.moveTo(6,-4); c.lineTo(this.reach-10,-1); c.lineTo(this.reach-2,0);
                c.lineTo(this.reach-10,1); c.lineTo(6,4); c.closePath(); c.fill();
                c.restore(); c.restore();
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 24; this.speed = 2.5 + (state.wave*0.1);
                this.hp = 20 + (state.wave * 30); this.maxHp = this.hp;
                this.angle = 0;
            }
            update(dt) {
                this.angle = Math.atan2(player.y-this.y, player.x-this.x);
                this.x += Math.cos(this.angle)*this.speed*(dt/16); this.y += Math.sin(this.angle)*this.speed*(dt/16);
                if(Math.hypot(player.x-this.x, player.y-this.y) < this.radius + player.radius) {
                    player.takeDamage(10 + state.wave*2); this.dead = true;
                }
            }
            hit(d) {
                this.hp -= d; particles.push(new Particle(this.x, this.y, '#f43f5e', 4, 6));
                if(this.hp <= 0) {
                    this.dead = true; state.score += 100; state.sessionCoins += 100;
                    sfx.enemyDie(); updateCoinUI();
                    const offsetX = (Math.random() - 0.5) * 80;
                    const offsetY = (Math.random() - 0.5) * 80;
                    floatingTexts.push(new FloatingText(player.x + offsetX, player.y + offsetY, "+100", "#fbbf24"));
                    if(state.score >= state.scoreThreshold && !state.isBossPhase) startBossPhase();
                } else {
                    sfx.hit();
                    floatingTexts.push(new FloatingText(this.x, this.y-20, "OOF!", "#f43f5e"));
                }
            }
            draw(c) {
                c.save(); c.translate(this.x, this.y); c.rotate(this.angle);
                c.shadowBlur=15; c.shadowColor='#f43f5e'; c.fillStyle='#f43f5e';
                fillRoundedRect(c, -15,-15,30,30,10);
                c.beginPath(); c.arc(5,0,8,0,7); c.fillStyle='#000'; c.fill();
                c.restore();
                c.fillStyle='rgba(0,0,0,0.5)'; fillRoundedRect(c, this.x-15, this.y-28, 30, 4, 2);
                c.fillStyle='#f43f5e'; fillRoundedRect(c, this.x-15, this.y-28, 30*(this.hp/this.maxHp), 4, 2);
            }
        }

        class Boss {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 80; this.maxHp = state.wave * 1500; this.hp = this.maxHp;
                this.speed = 1.3; this.angle = 0;
            }
            update(dt) {
                this.angle = Math.atan2(player.y-this.y, player.x-this.x);
                this.x += Math.cos(this.angle)*this.speed*(dt/16); this.y += Math.sin(this.angle)*this.speed*(dt/16);
                if(Math.hypot(player.x-this.x, player.y-this.y) < this.radius + player.radius) player.takeDamage(1.5);
                updateBossHealthBar(this.hp, this.maxHp);
            }
            hit(d) {
                this.hp -= d; state.shake = 8; sfx.hit();
                floatingTexts.push(new FloatingText(this.x, this.y-60, "OOF!", "#e11d48"));
                if(this.hp <= 0) {
                    this.dead = true; sfx.bossDie(); state.score += 2500; state.sessionCoins += 2500;
                    for(let i=0; i<5; i++) {
                        const ox = (Math.random()-0.5)*150;
                        const oy = (Math.random()-0.5)*150;
                        floatingTexts.push(new FloatingText(player.x + ox, player.y + oy, "+500", "#fbbf24"));
                    }
                    endBossPhase();
                }
            }
            draw(c) {
                c.save(); c.translate(this.x, this.y); c.rotate(this.angle);
                c.shadowBlur=40; c.shadowColor='#e11d48'; c.fillStyle='#e11d48';
                fillRoundedRect(c, -60,-60,120,120,25);
                c.restore();
            }
        }

        class Medic {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 22; this.angle = Math.random()*7;
                this.speed = 1.5; this.timer = 0; this.hp = 2;
            }
            update(dt) {
                this.timer -= dt; if(this.timer <= 0) { this.angle = Math.random()*7; this.timer = 2000; }
                this.x += Math.cos(this.angle)*this.speed; this.y += Math.sin(this.angle)*this.speed;
                this.x = Math.max(22, Math.min(WORLD_SIZE-22, this.x)); this.y = Math.max(22, Math.min(WORLD_SIZE-22, this.y));
            }
            hit() { 
                this.hp--; sfx.hit(); 
                if(this.hp <= 0) { this.dead = true; player.healFull(); }
            }
            draw(c) {
                c.save(); c.translate(this.x, this.y); c.rotate(this.angle);
                c.shadowBlur=20; c.shadowColor='#10b981'; c.fillStyle='#10b981';
                fillRoundedRect(c, -15,-18,30,36,12);
                c.fillStyle="white"; c.fillRect(-2,-10,4,20); c.fillRect(-10,-2,20,4);
                c.restore();
            }
        }

        class Particle {
            constructor(x,y,c,s,v){this.x=x;this.y=y;this.c=c;this.s=s;this.l=1;this.vx=(Math.random()-0.5)*v;this.vy=(Math.random()-0.5)*v;}
            update(){this.x+=this.vx;this.y+=this.vy;this.l-=0.02;}
            draw(c){c.globalAlpha=this.l;c.fillStyle=this.c;c.beginPath();c.arc(this.x,this.y,this.s*this.l,0,7);c.fill();c.globalAlpha=1;}
        }

        class FloatingText {
            constructor(x,y,t,c){this.x=x;this.y=y;this.t=t;this.c=c;this.l=1;}
            update(){this.y-=1.5;this.l-=0.015;}
            draw(c){c.globalAlpha=this.l;c.fillStyle=this.c;c.font='900 28px sans-serif';c.textAlign="center";c.shadowBlur=8;c.shadowColor="rgba(0,0,0,0.5)";c.fillText(this.t,this.x,this.y);c.globalAlpha=1;c.shadowBlur=0;}
        }

        function startBossPhase() {
            state.isBossPhase = true; enemies = []; document.getElementById('bossWarning').classList.add('active');
            sfx.bossSpawn(); setTimeout(() => document.getElementById('bossWarning').classList.remove('active'), 3000);
            document.getElementById('bossBarContainer').classList.remove('hidden');
            bosses.push(new Boss(player.x + 600, player.y));
        }

        function endBossPhase() {
            state.isBossPhase = false; bosses = []; document.getElementById('bossBarContainer').classList.add('hidden');
            state.wave++; state.scoreThreshold += 5000 + (state.wave * 2000);
            document.getElementById('waveDisplay').innerText = state.wave;
            spawnMedics();
        }

        function updateBossHealthBar(hp, max) {
            const p = Math.max(0, (hp/max)*100);
            const bhb = document.getElementById('bossHealthBar');
            if (bhb) bhb.style.width = p+'%';
            const bht = document.getElementById('bossHealthText');
            if (bht) bht.innerText = `${Math.ceil(hp)} / ${max}`;
        }

        function die() {
            state.isRunning = false; state.totalCoins += state.sessionCoins; saveData();
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('earnedCoins').innerText = `+${Math.floor(state.sessionCoins)}`;
            document.getElementById('finalScore').innerText = state.score;
            document.getElementById('finalWave').innerText = state.wave;
            updateCoinUI();
        }

        function spawnMedics() { if(!state.isBossPhase) medics.push(new Medic(player.x + 400, player.y + 400)); }

        function updateMinimap() {
            let html = ''; const scale = 120 / WORLD_SIZE;
            // Player
            html += `<div class="map-dot bg-cyan-400" style="left:${player.x*scale}px;top:${player.y*scale}px;width:6px;height:6px;z-index:5;"></div>`;
            // Enemies
            enemies.forEach(e => { html += `<div class="map-dot bg-rose-500" style="left:${e.x*scale}px;top:${e.y*scale}px;"></div>`; });
            // Bosses
            bosses.forEach(b => { html += `<div class="map-dot bg-rose-600" style="left:${b.x*scale}px;top:${b.y*scale}px;width:8px;height:8px;"></div>`; });
            // Healing Bots
            medics.forEach(m => { html += `<div class="map-dot bg-emerald-400 shadow-[0_0_5px_#10b981]" style="left:${m.x*scale}px;top:${m.y*scale}px;width:5px;height:5px;"></div>`; });
            
            minimapContent.innerHTML = html;
        }

        function gameLoop(ts) {
            if(!state.isRunning) return;
            const dt = ts - state.lastTime; state.lastTime = ts;
            mouse.worldX = mouse.x + state.camera.x; mouse.worldY = mouse.y + state.camera.y;
            player.update(dt);
            if(!state.isBossPhase) {
                state.enemySpawnTimer += dt;
                if(state.enemySpawnTimer > Math.max(400, 1500 - state.wave * 100)) {
                    enemies.push(new Enemy(player.x + (Math.random()-0.5)*1200, player.y + (Math.random()-0.5)*1200));
                    state.enemySpawnTimer = 0;
                }
            }
            enemies.forEach(e => e.update(dt)); bosses.forEach(b => b.update(dt)); medics.forEach(m => m.update(dt));
            particles.forEach(p => p.update()); floatingTexts.forEach(f => f.update());
            enemies = enemies.filter(e => !e.dead); bosses = bosses.filter(b => !b.dead); medics = medics.filter(m => !m.dead);
            particles = particles.filter(p => p.l > 0); floatingTexts = floatingTexts.filter(f => f.l > 0);
            state.camera.x += (Math.max(0, Math.min(WORLD_SIZE-canvas.width, player.x-canvas.width/2)) - state.camera.x)*0.1;
            state.camera.y += (Math.max(0, Math.min(WORLD_SIZE-canvas.height, player.y-canvas.height/2)) - state.camera.y)*0.1;
            if(state.shake > 0) state.shake *= 0.9;
            updateMinimap(); render(); requestAnimationFrame(gameLoop);
        }

        function render() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.translate(-state.camera.x + (Math.random()-0.5)*state.shake, -state.camera.y + (Math.random()-0.5)*state.shake);
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1;
            for(let i=0; i<=WORLD_SIZE; i+=200) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_SIZE); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD_SIZE,i); ctx.stroke(); }
            enemies.forEach(e => e.draw(ctx)); bosses.forEach(b => b.draw(ctx)); medics.forEach(m => m.draw(ctx));
            particles.forEach(p => p.draw(ctx)); if (player) player.draw(ctx); floatingTexts.forEach(f => f.draw(ctx));
            ctx.restore();
        }

        let shopTab = 'weapons';
        function updateTabStyles() {
            const tabs = ['weapons', 'armors', 'boots'];
            tabs.forEach(t => {
                const btn = document.getElementById(t + 'Tab');
                if (btn) {
                    if (shopTab === t) {
                        btn.className = 'flex-1 py-4 md:py-6 text-xs md:text-lg font-black uppercase tracking-widest shop-tab-active transition-all';
                    } else {
                        btn.className = 'flex-1 py-4 md:py-6 text-xs md:text-lg font-black uppercase tracking-widest bg-slate-900 text-slate-500 hover:text-white transition-all';
                    }
                }
            });
        }

        function renderShop() {
            const container = document.getElementById('shopContent'); if (!container) return;
            container.innerHTML = '';
            SHOP_ITEMS[shopTab].forEach(item => {
                const owned = state.ownedItems.includes(item.id);
                const equipped = (shopTab === 'weapons' ? state.currentWeapon : (shopTab === 'armors' ? state.currentArmor : state.currentBoots)) === item.id;
                const card = document.createElement('div');
                card.className = `item-card p-4 rounded-xl border ${equipped ? 'border-cyan-500 bg-cyan-500/10' : 'border-slate-800 bg-slate-900/40'} flex flex-col gap-2`;
                card.innerHTML = `<h3 class="font-black italic ${equipped ? 'text-cyan-400' : 'text-white'}">${item.name}</h3><p class="text-slate-500 text-[10px]">${item.desc}</p>
                    <button onclick="handleShop('${item.id}', ${item.price})" class="w-full py-2 rounded-lg font-black uppercase tracking-widest text-[10px] ${equipped ? 'bg-cyan-500 text-slate-950' : owned ? 'bg-slate-700 text-white' : state.totalCoins >= item.price ? 'bg-amber-500 text-slate-950' : 'bg-slate-800 text-slate-600 opacity-50'}">
                        ${equipped ? 'In Use' : owned ? 'Equip' : item.price}
                    </button>`;
                container.appendChild(card);
            });
            updateTabStyles();
        }

        window.handleShop = (id, price) => {
            sfx.init(); sfx.click();
            if(state.ownedItems.includes(id)) {
                if(shopTab === 'weapons') state.currentWeapon = id; else if(shopTab === 'armors') state.currentArmor = id; else state.currentBoots = id;
            } else if(state.totalCoins >= price) {
                state.totalCoins -= price; state.ownedItems.push(id);
                if(shopTab === 'weapons') state.currentWeapon = id; else if(shopTab === 'armors') state.currentArmor = id; else state.currentBoots = id;
            }
            updateCoinUI(); renderShop(); saveData();
        };

        document.getElementById('startBtn').onclick = () => {
            sfx.init(); sfx.click();
            state.isRunning = true; state.lastTime = performance.now();
            player = new Player(WORLD_SIZE/2, WORLD_SIZE/2); 
            enemies=[]; medics=[]; bosses=[];
            state.sessionCoins = 0; state.score = 0; state.wave = 1; state.scoreThreshold = 3000;
            spawnMedics(); 
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden'); 
            requestAnimationFrame(gameLoop);
        };
        document.getElementById('restartBtn').onclick = () => { sfx.init(); sfx.click(); document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('startBtn').click(); };
        document.getElementById('homeBtn').onclick = () => { sfx.init(); sfx.click(); document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); updateCoinUI(); };
        document.getElementById('openShopBtn').onclick = () => { sfx.init(); sfx.click(); document.getElementById('shopScreen').classList.remove('hidden'); renderShop(); };
        document.getElementById('closeShopBtn').onclick = () => { sfx.init(); sfx.click(); document.getElementById('shopScreen').classList.add('hidden'); updateCoinUI(); };
        document.getElementById('weaponsTab').onclick = () => { shopTab='weapons'; renderShop(); };
        document.getElementById('armorsTab').onclick = () => { shopTab='armors'; renderShop(); };
        document.getElementById('bootsTab').onclick = () => { shopTab='boots'; renderShop(); };

        window.onresize = () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; };
        window.onkeydown = e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()]=true; };
        window.onkeyup = e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()]=false; };
        window.onmousemove = e => { mouse.x=e.clientX; mouse.y=e.clientY; };
        window.onmousedown = () => mouse.isDown=true; window.onmouseup = () => mouse.isDown=false;
        canvas.width=window.innerWidth; canvas.height=window.innerHeight; loadData();
    </script>
</body>
</html>
